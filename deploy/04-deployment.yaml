apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
    spec:
      securityContext:
        runAsNonRoot: true
        # fsGroup is required for the PVC to be group-writable (fixes mkdir under /home/node/.n8n).
        # Do not use 1000 — restricted-v2 only allows GIDs from your *project* range. Set it with:
        #   ./apply-deployment-openshift.sh
        # or: oc get ns n8n -o jsonpath='{.metadata.annotations.openshift\.io/sa\.scc\.supplemental-groups}'
        # (use the number before "/"; that is a valid fsGroup for this namespace).
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: n8n
          # Pin a version tag for production, e.g. docker.n8n.io/n8nio/n8n:1.123.4
          image: docker.io/n8nio/n8n:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
            # Flat data dir on PVC — avoids /home/node/.n8n/.n8n double-nesting on OpenShift
            - name: HOME
              value: "/data"
            - name: N8N_USER_FOLDER
              value: "/data"
            - name: N8N_HOST
              value: "0.0.0.0"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "https"
            # Edge TLS on the Route; n8n still serves HTTP on the pod port.
            - name: N8N_PROXY_HOPS
              value: "1"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: encryption-key
            # "true" exits if /home/node/.n8n files are not chmod-able; often breaks on OpenShift PVCs.
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "false"
            # Task runners are a separate process; disable on tight SCCs, re-enable when stable.
            - name: N8N_RUNNERS_ENABLED
              value: "false"
            - name: TZ
              value: "UTC"
            - name: GENERIC_TIMEZONE
              value: "UTC"
            - name: WEBHOOK_URL
              value: ""  # Set by deploy-to-rosa-hcp.sh from Route host
            # Community nodes (required for AI Agent + MCP Client)
            - name: N8N_COMMUNITY_PACKAGES_ENABLED
              value: "true"
            - name: N8N_UNVERIFIED_PACKAGES_ENABLED
              value: "true"
            - name: N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE
              value: "true"
            # false = install/update community nodes from n8n UI (Settings → Community nodes)
            - name: N8N_COMMUNITY_PACKAGES_MANAGED_BY_ENV
              value: "false"
            - name: N8N_REINSTALL_MISSING_PACKAGES
              value: "true"
          volumeMounts:
            - name: n8n-data
              mountPath: /data
            - name: n8n-cache
              mountPath: /tmp/.cache
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data
        - name: n8n-cache
          emptyDir: {}
