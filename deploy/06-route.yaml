apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: n8n
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
spec:
  to:
    kind: Service
    name: n8n
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  # host: n8n.apps.example.com   # optional: omit for auto-generated hostname
