---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models-pvc
  namespace: n8n
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ollama
  namespace: n8n
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: n8n
  labels:
    app: ollama
spec:
  replicas: 1
  # RWO PVC: RollingUpdate leaves two pods and fails Multi-Attach.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      serviceAccountName: ollama
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
          protocol: TCP
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        - name: OLLAMA_MODELS
          value: "/models"
        - name: HOME
          value: "/models"
        # Match CPU limit for faster inference on large workers (m5.4xlarge+ recommended).
        - name: OLLAMA_NUM_THREADS
          value: "6"
        - name: OLLAMA_MAX_LOADED_MODELS
          value: "1"
        - name: OLLAMA_NUM_PARALLEL
          value: "1"
        - name: OLLAMA_FLASH_ATTENTION
          value: "1"
        # Keep model loaded between chat messages (avoids ~35s cold start per request).
        - name: OLLAMA_KEEP_ALIVE
          value: "30m"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        # Max on current m5a.2xlarge workers (~7.5 CPU / ~30 GiB allocatable per node).
        # Tuned to fit one 2xlarge node with n8n + system pods. Bump after adding m5.4xlarge workers.
        resources:
          requests:
            cpu: "5"
            memory: "20Gi"
          limits:
            cpu: "6"
            memory: "24Gi"
        volumeMounts:
        - name: ollama-models
          mountPath: /models
        livenessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: ollama-models
        persistentVolumeClaim:
          claimName: ollama-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: n8n
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434
    protocol: TCP
    name: http
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ollama
  namespace: n8n
  labels:
    app: ollama
spec:
  to:
    kind: Service
    name: ollama
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
