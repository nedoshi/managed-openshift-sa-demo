# Ollama on ROSA with NVIDIA GPU (replaces CPU deployment in 07-ollama-deployment.yaml).
#
# Prerequisites:
#   1. GPU worker machine pool (e.g. AWS g4dn.xlarge / g5.xlarge) on ROSA HCP
#   2. NVIDIA GPU Operator installed (ClusterPolicy Ready)
#   3. Verify GPU nodes: oc get nodes -l nvidia.com/gpu.present=true
#
# Switch from CPU to GPU (reuses existing PVC, Service, Route from 07):
#   oc delete deployment ollama -n n8n --ignore-not-found
#   oc apply -f deploy/08-ollama-deployment-gpu.yaml
#   oc wait --for=condition=Available deployment/ollama -n n8n --timeout=600s
#   oc exec -n n8n deployment/ollama -- ollama run llama3.1:8b "ok"
#
# Switch back to CPU:
#   oc delete deployment ollama -n n8n
#   oc apply -f deploy/07-ollama-deployment.yaml
#
# Do not run 07 and 08 deployments at the same time (same name: ollama).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: n8n
  labels:
    app: ollama
    ollama.ai/compute: gpu
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        ollama.ai/compute: gpu
    spec:
      serviceAccountName: ollama
      # Schedule only on GPU workers (NVIDIA GPU Operator label).
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODELS
              value: "/models"
            - name: HOME
              value: "/models"
            - name: OLLAMA_NUM_GPU
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
            - name: OLLAMA_NUM_CTX
              value: "8192"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "2"
              memory: "12Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: ollama-models
              mountPath: /models
          startupProbe:
            httpGet:
              path: /
              port: 11434
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-pvc
