---
# Deploy the Kubernetes/OpenShift MCP server via the MCP Lifecycle Operator.
# Prerequisites: install-mcp-operator.sh must be run first.
#
# Service URL (in-cluster, for n8n):
#   http://kubernetes-mcp-server.openshift-mcp-server.svc.cluster.local:8080/sse
#
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: kubernetes-mcp-server
  namespace: openshift-mcp-server
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: quay.io/containers/kubernetes_mcp_server:latest
  config:
    port: 8080
    args:
      - --read-only
  runtime:
    security:
      # Operator defaults to namespace "default" SA (no RBAC). Use SA from mcp-server-rbac.yaml.
      serviceAccountName: kubernetes-mcp-server
